<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#efefed;
  --bg-info:#e6f1fb;--bg-danger:#fcebeb;--bg-success:#eaf3de;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9a9a96;
  --text-info:#0c447c;--text-danger:#a32d2d;--text-success:#27500a;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --r8:8px;--r12:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#262624;--bg3:#2e2e2c;
    --bg-info:#042c53;--bg-danger:#501313;--bg-success:#173404;
    --text:#f0efe8;--text2:#a8a8a2;--text3:#6b6b67;
    --text-info:#85b7eb;--text-danger:#f09595;--text-success:#97c459;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  }
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.onboard{padding:40px 24px}
.onboard .logo{font-size:48px;margin-bottom:16px}
.onboard h1{font-size:22px;font-weight:600;margin-bottom:8px}
.onboard p{font-size:15px;color:var(--text2);line-height:1.6;margin-bottom:28px}
input[type=text]{width:100%;padding:12px 14px;font-size:16px;font-family:var(--font);border:0.5px solid var(--border2);border-radius:var(--r12);background:var(--bg2);color:var(--text);margin-bottom:12px;outline:none}
input[type=text]:focus{border-color:#378add;box-shadow:0 0 0 3px rgba(55,138,221,0.15)}
.btn{display:block;width:100%;padding:13px;font-size:15px;font-family:var(--font);background:var(--text);color:var(--bg);border:none;border-radius:var(--r12);cursor:pointer;font-weight:500;transition:opacity 0.15s}
.btn:active{opacity:0.8}
.btn-ghost{background:none;color:var(--text2);border:0.5px solid var(--border);padding:7px 14px;font-size:13px;border-radius:var(--r8);width:auto;display:inline-block}
.user-bar{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.user-info{font-size:13px;color:var(--text2)}
.user-name{font-weight:600;color:var(--text)}
.header{padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border)}
.header h1{font-size:17px;font-weight:600;flex:1}
.badge{font-size:11px;background:var(--bg-info);color:var(--text-info);padding:3px 9px;border-radius:var(--r8);font-weight:500}
.nav{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.nav-btn{flex:1;padding:12px 0;font-size:13px;background:none;border:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;font-family:var(--font);transition:all 0.15s}
.nav-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
.section{padding:0 16px}
.section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;padding:16px 0 8px;font-weight:600}
.team-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding-bottom:8px}
.team-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r12);padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color 0.15s,background 0.15s;-webkit-tap-highlight-color:transparent}
.team-card.fav{border-color:#378add;background:var(--bg-info)}
.team-flag{font-size:22px;line-height:1;flex-shrink:0}
.team-name{font-size:13px;color:var(--text);flex:1;line-height:1.3}
.fav-icon{font-size:15px;color:var(--text3);flex-shrink:0}
.team-card.fav .fav-icon{color:var(--text-info)}
.match-date-header{font-size:12px;color:var(--text3);padding:14px 0 6px;font-weight:600}
.match-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r12);padding:14px;margin-bottom:8px}
.match-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.match-team{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;max-width:38%}
.match-team.right{flex-direction:row-reverse;text-align:right}
.match-score{font-size:20px;font-weight:600;min-width:60px;text-align:center;color:var(--text)}
.match-score.live{color:var(--text-danger)}
.match-score.vs{font-size:14px;color:var(--text3);font-weight:400}
.match-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.match-meta span{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.live-badge{background:var(--bg-danger);color:var(--text-danger);font-size:10px;padding:2px 7px;border-radius:var(--r8);font-weight:600}
.ft-badge{background:var(--bg-success);color:var(--text-success);font-size:10px;padding:2px 7px;border-radius:var(--r8);font-weight:600}
.group-tag{background:var(--bg3);color:var(--text3);font-size:10px;padding:2px 7px;border-radius:var(--r8)}
.fav-toggle-row{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 12px}
.fav-pill{font-size:13px;padding:6px 12px;border-radius:20px;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border);cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.fav-pill.active{background:var(--bg-info);color:var(--text-info);border-color:#378add;font-weight:500}
.empty{text-align:center;padding:52px 24px;color:var(--text2);font-size:14px;line-height:1.7}
.empty i{font-size:36px;display:block;margin-bottom:12px;color:var(--text3)}
.refresh-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;font-size:11px;color:var(--text3)}
.refresh-row.error{color:var(--text-danger)}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
const GROUPS={

// Live score overlay — keyed by "home|away"
let liveScores = {};
let lastFetch = null;
let fetchError = false;
let fetching = false;

async function fetchScores() {
  if (fetching) return;
  fetching = true;
  try {
    // Append timestamp so corsproxy.io can't serve a cached response
    const res = await fetch(
      'https://corsproxy.io/?https://api.football-data.org/v4/competitions/2000/matches&_=' + Date.now(),
      {headers: {'X-Auth-Token': 'dd70e5f09cc84115af636d5d6a3c3166'}, cache: 'no-store'}
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const newScores = {};
    (data.matches || []).forEach(m => {
      const h = canon(m.homeTeam?.name || '');
      const a = canon(m.awayTeam?.name || '');
      if (!h || !a) return;
      // Key by normalized names so minor variants (& vs and, casing, etc.) still match
      const key = norm(h) + '|' + norm(a);
      const ft = m.score?.fullTime;
      if (m.status === 'FINISHED' && ft?.home != null) {
        newScores[key] = {homeScore: ft.home, awayScore: ft.away, status: 'finished'};
      } else if ((m.status === 'IN_PLAY' || m.status === 'PAUSED') && ft?.home != null) {
        newScores[key] = {homeScore: ft.home, awayScore: ft.away, status: 'live'};
      }
    });
    liveScores = newScores;
    lastFetch = new Date();
    fetchError = false;
    const cnt = Object.keys(newScores).length;
    console.log('[WC2026] Loaded', cnt, 'scores. Keys:', Object.keys(newScores).join(' | '));
    const missing = BASE_MATCHES.filter(bm => {
      const k = norm(bm.home)+'|'+norm(bm.away);
      const rk = norm(bm.away)+'|'+norm(bm.home);
      const kickoff = new Date(bm.date+':00');
      return (new Date()-kickoff)/60000 > 130 && !newScores[k] && !newScores[rk];
    });
    if (missing.length) console.warn('[WC2026] Missing scores for:', missing.map(m=>m.home+' v '+m.away).join(', '));
    if (cnt === 0 && (data.matches||[]).length > 0) {
      console.warn('[WC2026] Raw API names:', (data.matches||[]).slice(0,8).map(m=>`"${m.homeTeam?.name}" vs "${m.awayTeam?.name}"`).join(' | '));
    }
  } catch(e) {
    fetchError = true;
    console.warn('[WC2026] Score fetch failed:', e.message || e);
  } finally {
    fetching = false;
  }
}

function mergedMatch(bm) {
  // Look up by normalized key; also try reverse (in case API has home/away swapped)
  const key = norm(bm.home) + '|' + norm(bm.away);
  const revKey = norm(bm.away) + '|' + norm(bm.home);
  const live = liveScores[key];
  if (live) return {...bm, ...live};
  const rev = liveScores[revKey];
  if (rev) return {...bm, homeScore: rev.awayScore, awayScore: rev.homeScore, status: rev.status};
  // Auto-detect if match time has passed
  const kickoff = new Date(bm.date + ':00');
  const now = new Date();
  const elapsed = (now - kickoff) / 60000; // minutes since kickoff
  if (elapsed > 0 && elapsed < 130) return {...bm, status:'live'};
  return {...bm, status: elapsed >= 130 ? 'unknown' : 'scheduled'};
}

let S={tab:"matches",user:null,favs:[],activeFav:null};
const $=id=>document.getElementById(id);

function fmtET(ds){
  return new Date(ds+":00").toLocaleString("en-US",{timeZone:"America/New_York",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",hour12:true})+" ET";
}
function fmtDay(ds){
  return new Date(ds+":00").toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"long",month:"long",day:"numeric"});
}

function favsKey(name){return "wc2026_favs_"+name.toLowerCase().replace(/\s+/g,"_");}
function loadFavs(name){
  try{const r=localStorage.getItem(favsKey(name));S.favs=r?JSON.parse(r):[];}catch(e){S.favs=[];}
}
function saveFavs(){
  if(!S.user)return;
  try{localStorage.setItem(favsKey(S.user),JSON.stringify(S.favs));}catch(e){}
}
function toggleFav(name){
  S.favs=S.favs.includes(name)?S.favs.filter(f=>f!==name):[...S.favs,name];
  if(!S.favs.includes(S.activeFav))S.activeFav=S.favs[0]||null;
  saveFavs();render();
}

function matchCard(bm){
  const m = mergedMatch(bm);
  const live=m.status==="live", done=m.status==="finished";
  const hasScore = (m.homeScore != null && m.awayScore != null);
  const scoreHtml = hasScore
    ? `<div class="match-score${live?" live":""}">${m.homeScore}–${m.awayScore}</div>`
    : `<div class="match-score vs">vs</div>`;
  return `<div class="match-card">
    <div class="match-teams">
      <div class="match-team">${FLAGS[m.home]||"🏳"} <span>${m.home}</span></div>
      ${scoreHtml}
      <div class="match-team right">${FLAGS[m.away]||"🏳"} <span>${m.away}</span></div>
    </div>
    <div class="match-meta">
      ${live?`<span class="live-badge">● Live</span>`:""}
      ${done?`<span class="ft-badge">FT</span>`:""}
      <span><i class="ti ti-clock" style="font-size:11px"></i> ${fmtET(m.date)}</span>
      <span><i class="ti ti-map-pin" style="font-size:11px"></i> ${m.venue}, ${m.city}</span>
      <span class="group-tag">Group ${teamGroup(m.home)}</span>
    </div>
  </div>`;
}

function refreshStatus(){
  if(fetchError) return `<div class="refresh-row error"><i class="ti ti-wifi-off" style="font-size:12px"></i> Score update failed — retrying</div>`;
  if(fetching) return `<div class="refresh-row"><i class="ti ti-refresh spin" style="font-size:12px"></i> Updating scores...</div>`;
  const cnt = Object.keys(liveScores).length;
  const t = lastFetch ? lastFetch.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}) : "never";
  return `<div class="refresh-row"><i class="ti ti-check" style="font-size:12px"></i> Scores updated ${t} · ${cnt} result${cnt!==1?'s':''} loaded</div>`;
}

function render(){
  const app=$("app");
  if(!S.user){
    app.innerHTML=`<div class="onboard">

      <p>Track all 104 matches, follow your favourite teams, and see live scores. Each person gets their own saved favourites.</p>

      <button class="btn" onclick="doStart()">Get started</button>
    </div>`;
    const inp=$("nameIn");
    if(inp){inp.focus();inp.addEventListener("keydown",e=>{if(e.key==="Enter")doStart();});}

  }

  const allTeams=Object.values(GROUPS).flat();
  let html=`
  <div class="user-bar">
    <div class="user-info">👋 <span class="user-name">${S.user}</span></div>

  </div>

    <button class="nav-btn${S.tab==="teams"?" active":""}" onclick="setTab('teams')">All teams</button>
  </div>`;

  if(S.tab==="teams"){
    html+=`<div class="section">`;
    for(const[g,ts]of Object.entries(GROUPS)){
      html+=`<div class="section-title">Group ${g}</div><div class="team-grid">`;
      ts.forEach(t=>{
        const fav=S.favs.includes(t);
        html+=`<div class="team-card${fav?" fav":""}" onclick="toggleFav('${t.replace(/'/g,"\'")}')">
          <span class="team-flag">${FLAGS[t]||"🏳"}</span>
          <span class="team-name">${t}</span>
          <i class="ti ti-star${fav?"-filled":""} fav-icon"></i>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  }else if(S.tab==="matches"){
    const days={};
    BASE_MATCHES.forEach(m=>{const d=fmtDay(m.date);(days[d]=days[d]||[]).push(m);});
    html+=`<div class="section">`;
    for(const[day,ms]of Object.entries(days)){
      html+=`<div class="match-date-header">${day}</div>`;
      ms.forEach(m=>html+=matchCard(m));
    }
    html+=`</div>${refreshStatus()}`;
  }else if(S.tab==="favs"){
    if(!S.favs.length){
      html+=`<div class="empty"><i class="ti ti-star"></i>No favourite teams yet.<br>Go to <strong>All teams</strong> to pick yours.</div>`;
    }else{
      if(!S.activeFav||!S.favs.includes(S.activeFav))S.activeFav=S.favs[0];
      html+=`<div class="section"><div class="section-title">Your teams</div><div class="fav-toggle-row">`;
      S.favs.forEach(t=>{
        html+=`<span class="fav-pill${S.activeFav===t?" active":""}" onclick="setFav('${t.replace(/'/g,"\'")}') ">${FLAGS[t]||"🏳"} ${t}</span>`;
      });
      html+=`</div>`;
      if(S.activeFav){
        html+=`<div class="section-title">${FLAGS[S.activeFav]||"🏳"} ${S.activeFav} — schedule</div>`;
        const ms=BASE_MATCHES.filter(m=>m.home===S.activeFav||m.away===S.activeFav);
        if(!ms.length)html+=`<div class="empty" style="padding:24px 0">No matches found.</div>`;
        else ms.forEach(m=>html+=matchCard(m));
      }
      html+=`</div>${refreshStatus()}`;
    }
  }
  app.innerHTML=html;
}

async function doStart(){
  const inp=$("nameIn");
  const name=inp?inp.value.trim():"";
  if(!name){if(inp)inp.focus();return;}
  S.user=name;
  try{localStorage.setItem("wc2026_user",name);}catch(e){}
  loadFavs(name);
  S.activeFav=S.favs[0]||null;
  await fetchScores();
  render();
}
function doSwitch(){
  try{localStorage.removeItem("wc2026_user");}catch(e){}
  S={tab:"matches",user:null,favs:[],activeFav:null};render();
}
function setTab(t){S.tab=t;render();}
function setFav(name){S.activeFav=name;render();}

setInterval(async()=>{
  await fetchScores();
  if(S.user && (S.tab==="matches"||S.tab==="favs")) render();
}, 30000);

// Restore session from localStorage on page load
(async()=>{
  try{
    const saved=localStorage.getItem("wc2026_user");
    if(saved){
      S.user=saved;
      loadFavs(saved);
      S.activeFav=S.favs[0]||null;
    }
  }catch(e){}
  await fetchScores();
  render();
})();
</script>
</body>
